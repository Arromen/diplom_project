services:
  postgres:
    image: postgres:14
    container_name: schedule-postgres
    environment:
      POSTGRES_DB: schedule_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5433:5432" # Снаружи порт будет 5433, а внутри контейнера останется стандартный 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: