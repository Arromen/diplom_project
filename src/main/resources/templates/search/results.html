<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Результаты поиска</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Свободные аудитории</h1>

<p>С <span th:text="${startTime}"></span> до <span th:text="${endTime}"></span></p>

<div th:if="${#lists.isEmpty(availableClassrooms)}" class="alert alert-warning">
    Нет свободных аудиторий в указанный период.
</div>

<table th:unless="${#lists.isEmpty(availableClassrooms)}" class="table table-striped">
    <thead>
    <tr>
        <th>Аудитория</th>
        <th>Вместимость</th>
        <th>Тип</th>
        <th>Действие</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${availableClassrooms}">
        <td th:text="${c.name}"></td>
        <td th:text="${c.capacity}"></td>
        <td th:text="${c.type}"></td>
        <td>
            <a th:href="@{/bookings/new(classroomId=${c.id}, startTime=${startTime}, endTime=${endTime})}"
               class="btn btn-sm btn-outline-success">Забронировать</a>
        </td>
    </tr>
    </tbody>
</table>

<a href="/search" class="btn btn-secondary">Новый поиск</a>
</body>
</html>
