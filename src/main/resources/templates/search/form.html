<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поиск свободных аудиторий</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Найти свободную аудиторию</h1>

<div th:if="${error}" class="alert alert-danger">[[${error}]]</div>

<form action="/search/results" method="get">
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Начало</label>
            <input type="datetime-local" name="startTime" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Окончание</label>
            <input type="datetime-local" name="endTime" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Минимальная вместимость</label>
        <input type="number" name="minCapacity" class="form-control" value="1" min="1">
    </div>

    <button type="submit" class="btn btn-primary">Найти</button>
</form>
</body>
</html>
