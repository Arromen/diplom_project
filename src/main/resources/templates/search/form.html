<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск аудиторий — Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            color: #333;
        }
        /* Стили бокового меню (Sidebar) */
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            width: 260px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: #94a3b8;
            padding: 12px 20px;
            margin: 4px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover {
            color: #fff;
            background-color: rgba(255,255,255,0.05);
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        /* Главный контент */
        .main-content {
            margin-left: 260px;
            padding: 40px;
        }
        /* Премиальная карточка формы */
        .card-custom {
            background: #fff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            max-width: 800px;
        }
        .form-label-custom {
            font-weight: 600;
            font-size: 0.85rem;
            color: #475569;
            margin-bottom: 8px;
        }
        .input-custom {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .input-custom:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="px-4 py-4 d-flex align-items-center gap-2">
        <i class="bi bi-calendar2-week text-primary fs-3"></i>
        <span class="text-white fw-bold fs-5">ИС «Университет»</span>
    </div>
    <hr class="text-secondary mx-3">
    <ul class="nav flex-column mt-3">
        <li class="nav-item"><a class="nav-link" href="/schedule"><i class="bi bi-people"></i> Группы</a></li>
        <li class="nav-item"><a class="nav-link" href="/schedule/teachers"><i class="bi bi-person-badge"></i> Преподаватели</a></li>
        <li class="nav-item"><a class="nav-link active" href="/search"><i class="bi bi-search"></i> Поиск свободных комнат</a></li>
        <li class="nav-item" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')"><a class="nav-link" href="/bookings"><i class="bi bi-journal-bookmark"></i> Все бронирования</a></li>
    </ul>
</div>

<div class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-5 bg-white p-3 rounded-3 shadow-sm">
        <div>
            <h4 class="fw-bold mb-0">Интеллектуальный поиск аудиторий</h4>
            <small class="text-muted">Проверка доступности помещений вуза в реальном времени</small>
        </div>
        <div sec:authorize="isAuthenticated()" class="text-end">
            <span class="fw-semibold text-dark"><i class="bi bi-person-circle text-primary"></i> <span sec:authentication="name"></span></span>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger rounded-3" th:text="${error}"></div>

    <div class="card card-custom p-5">
        <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-sliders text-primary me-2"></i>Параметры фильтрации</h5>

        <form action="/search/results" method="get">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label form-label-custom"><i class="bi bi-clock me-1 text-secondary"></i> Время начала занятия</label>
                    <input type="datetime-local" name="startTime" class="form-control input-custom" required placeholder="Укажите дату и время">
                </div>
                <div class="col-md-6">
                    <label class="form-label form-label-custom"><i class="bi bi-clock-fill me-1 text-secondary"></i> Время окончания занятия</label>
                    <input type="datetime-local" name="endTime" class="form-control input-custom" required placeholder="Укажите дату и время">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label form-label-custom"><i class="bi bi-person-workspace me-1 text-secondary"></i> Минимально необходимая вместимость (мест)</label>
                <div style="max-width: 250px;">
                    <input type="number" name="minCapacity" class="form-control input-custom" value="1" min="1">
                </div>
            </div>

            <hr class="my-4 text-secondary opacity-25">

            <button type="submit" class="btn btn-primary px-4 py-2.5 fw-medium shadow-sm d-inline-flex align-items-center gap-2" style="border-radius: 8px;">
                <i class="bi bi-search"></i> Найти свободные аудитории
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
<script>
    flatpickr("input[type=datetime-local]", {
        enableTime: true,
        dateFormat: "Y-m-dTH:i",
        time_24hr: true,
        locale: "ru" // Русификация всплывающего календаря
    });
</script>
</body>
</html>
