<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бронирования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Все бронирования</h1>
<a href="/bookings/new" class="btn btn-primary mb-3">Забронировать аудиторию</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Аудитория</th>
        <th>Кто</th>
        <th>Цель</th>
        <th>Время</th>
        <th>Тип</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="b : ${bookings}">
        <td th:text="${b.classroom.name}"></td>
        <td th:text="${b.bookedBy}"></td>
        <td th:text="${b.purpose}"></td>
        <td th:text="${#temporals.format(b.startTime, 'dd.MM HH:mm')} + ' – ' + ${#temporals.format(b.endTime, 'HH:mm')}"></td>
        <td th:text="${b.bookingType}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
