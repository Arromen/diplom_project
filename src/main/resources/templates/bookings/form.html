<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новое бронирование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="container mt-4">
<h1>Забронировать аудиторию</h1>
<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

<form th:action="@{/bookings}" th:object="${booking}" method="post">
    <div class="mb-3">
        <label class="form-label">Аудитория</label>
        <select th:field="*{classroom.id}" class="form-select">
            <option th:each="c : ${classrooms}" th:value="${c.id}" th:text="${c.name}"></option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Ваше ФИО</label>
        <input type="text" th:field="*{bookedBy}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Цель бронирования</label>
        <input type="text" th:field="*{purpose}" class="form-control" required>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Начало</label>
            <input type="datetime-local" th:field="*{startTime}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Окончание</label>
            <input type="datetime-local" th:field="*{endTime}" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Тип</label>
        <select th:field="*{bookingType}" id="bookingType" class="form-select">
            <option value="">Выберите тип...</option>
            <option value="lesson">Учебное занятие</option>
            <option value="meeting">Совещание</option>
            <option value="event">Мероприятие</option>
            <option value="consultation">Консультация</option>
        </select>
    </div>

    <div id="lessonFields" class="d-none">
        <div class="mb-3">
            <label class="form-label">Группа</label>
            <select th:field="*{group.id}" class="form-select">
                <option value="">Выберите группу</option>
                <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Преподаватель</label>
            <select th:field="*{teacher.id}" class="form-select">
                <option value="">Выберите преподавателя</option>
                <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Предмет</label>
            <select th:field="*{subject.id}" class="form-select">
                <option value="">Выберите предмет</option>
                <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.name}"></option>
            </select>
        </div>
    </div>

    <button type="submit" class="btn btn-success">Забронировать</button>
    <a href="/bookings" class="btn btn-secondary">Отмена</a>
</form>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // Инициализация кроссбраузерного календаря Flatpickr
    flatpickr("input[type=datetime-local]", {
        enableTime: true,
        dateFormat: "Y-m-dTH:i",
        time_24hr: true
    });

    // Динамическое отображение полей в зависимости от типа бронирования
    const bookingTypeSelect = document.getElementById('bookingType');
    const lessonFields = document.getElementById('lessonFields');

    function toggleFields() {
        if (bookingTypeSelect.value === 'lesson') {
            lessonFields.classList.remove('d-none');
        } else {
            lessonFields.classList.add('d-none');
        }
    }

    bookingTypeSelect.addEventListener('change', toggleFields);
    // Вызов при загрузке на случай, если форма вернулась с ошибкой валидации
    toggleFields();
</script>
</body>
</html>
