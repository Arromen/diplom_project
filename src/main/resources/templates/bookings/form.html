<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новое бронирование — ИС «Университет»</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; color: #333; }
        .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; width: 260px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .sidebar .nav-link { font-weight: 500; color: #94a3b8; padding: 12px 20px; margin: 4px 15px; border-radius: 8px; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .sidebar .nav-link.active { color: #fff; background-color: #3b82f6; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .main-content { margin-left: 260px; padding: 40px; }
        .card-custom { background: #fff; border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); }
        .form-label-custom { font-weight: 600; font-size: 0.85rem; color: #475569; margin-bottom: 6px; }
        .input-custom { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; font-size: 0.95rem; }
        .input-custom:focus { background-color: #fff; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="px-4 py-4 d-flex align-items-center gap-2">
        <i class="bi bi-calendar2-week text-primary fs-3"></i>
        <span class="text-white fw-bold fs-5">ИС «Университет»</span>
    </div>
    <hr class="text-secondary mx-3">
    <ul class="nav flex-column mt-3">
        <li class="nav-item"><a class="nav-link" href="/schedule"><i class="bi bi-people"></i> Группы</a></li>
        <li class="nav-item"><a class="nav-link" href="/schedule/teachers"><i class="bi bi-person-badge"></i> Преподаватели</a></li>
        <li class="nav-item"><a class="nav-link" href="/search"><i class="bi bi-search"></i> Поиск свободных комнат</a></li>
        <li class="nav-item" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')"><a class="nav-link active" href="/bookings"><i class="bi bi-journal-bookmark"></i> Все бронирования</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="mb-4">
        <h4 class="fw-bold mb-0">Подать заявку на резервирование залов</h4>
        <p class="text-muted small">Автоматическая онлайн-модерация наложений дат</p>
    </div>

    <div class="card card-custom p-5" style="max-width: 850px;">
        <form th:action="@{/bookings}" th:object="${booking}" method="post">

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Целевая аудитория</label>
                    <select th:field="*{classroom.id}" class="form-select input-custom" required>
                        <option th:each="c : ${classrooms}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Тип события</label>
                    <select th:field="*{bookingType}" id="bookingType" class="form-select input-custom" required>
                        <option value="">Выберите категорию...</option>
                        <option value="lesson">Учебное занятие</option>
                        <option value="meeting">Совещание</option>
                        <option value="event">Мероприятие</option>
                        <option value="consultation">Консультация</option>
                    </select>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Заявитель (ФИО)</label>
                    <input type="text" th:field="*{bookedBy}" class="form-control input-custom" required placeholder="Иванов И.И.">
                </div>
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Тема / Краткое описание</label>
                    <input type="text" th:field="*{purpose}" class="form-control input-custom" required placeholder="Заседание кафедры ИС">
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Время начала</label>
                    <input type="datetime-local" th:field="*{startTime}" class="form-control input-custom" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Время окончания</label>
                    <input type="datetime-local" th:field="*{endTime}" class="form-control input-custom" required>
                </div>
            </div>

            <div id="lessonFields" class="d-none bg-light p-4 rounded-3 mb-4 border">
                <h6 class="fw-bold mb-3 text-secondary"><i class="bi bi-mortarboard me-2"></i>Параметры академического занятия</h6>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label form-label-custom">Академическая группа</label>
                        <select th:field="*{group.id}" class="form-select input-custom">
                            <option value="">-- Выбрать --</option>
                            <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label form-label-custom">Преподаватель</label>
                        <select th:field="*{teacher.id}" class="form-select input-custom">
                            <option value="">-- Выбрать --</option>
                            <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label form-label-custom">Дисциплина</label>
                        <select th:field="*{subject.id}" class="form-select input-custom">
                            <option value="">-- Выбрать --</option>
                            <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.name}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-5">
                <a href="/bookings" class="btn btn-light px-4">Отмена</a>
                <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check2-circle me-1"></i> Зарегистрировать бронь</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    flatpickr("input[type=datetime-local]", { enableTime: true, dateFormat: "Y-m-dTH:i", time_24hr: true });

    const bookingTypeSelect = document.getElementById('bookingType');
    const lessonFields = document.getElementById('lessonFields');
    function toggleFields() {
        if (bookingTypeSelect.value === 'lesson') { lessonFields.classList.remove('d-none'); }
        else { lessonFields.classList.add('d-none'); }
    }
    bookingTypeSelect.addEventListener('change', toggleFields);
    toggleFields();

    /*[自然]*/
    const errorMessage = [[${errorMessage}]];
    /*[/]*/
    if (errorMessage) {
        Swal.fire({ icon: 'error', title: 'Регистрация отклонена', text: errorMessage, confirmButtonColor: '#3b82f6' });
    }
</script>
</body>
</html>
