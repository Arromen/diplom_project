<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Расписание на неделю: <span th:text="${group.name}"></span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .day-cell { min-height: 100px; background-color: #f8f9fa; }
        .lesson-item { background-color: #e9ecef; padding: 6px; margin-bottom: 4px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body class="container mt-4">
<h1>Расписание группы: <span th:text="${group.name}"></span></h1>
<p>Неделя с <span th:text="${#temporals.format(monday, 'dd.MM.yyyy')}"></span></p>

<div class="table-responsive">
    <table class="table table-bordered">
        <thead class="table-light">
        <tr>
            <th>Понедельник</th>
            <th>Вторник</th>
            <th>Среда</th>
            <th>Четверг</th>
            <th>Пятница</th>
            <th>Суббота</th>
            <th>Воскресенье</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <!-- Для каждого дня -->
            <td th:each="day : ${weekDates}" class="align-top day-cell">
                <div class="fw-bold mb-2" th:text="${#temporals.dayOfWeekName(day)} + ', ' + ${#temporals.format(day, 'dd.MM')}"></div>
                <!-- Занятия в этот день -->
                <div th:each="lesson : ${lessons}"
                     th:if="${lesson.startTime.toLocalDate().equals(day)}"
                     class="lesson-item">
                    <div><strong th:text="${lesson.subject?.name ?: lesson.purpose}"></strong></div>
                    <div th:text="${#temporals.format(lesson.startTime, 'HH:mm')} + '–' + ${#temporals.format(lesson.endTime, 'HH:mm')}"></div>
                    <div th:text="${lesson.classroom.name}"></div>
                    <div th:text="${lesson.teacher?.fullName ?: ''}" class="text-muted"></div>
                </div>
                <div th:if="${#lists.isEmpty(#lists.select(lessons, ${it.startTime.toLocalDate().equals(day)}))}" class="text-muted">
                    Нет занятий
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<a href="/schedule/group/{id}" th:href="@{/schedule/group/{id}(id=${group.id})}" class="btn btn-secondary">← К полному расписанию</a>
</body>
</html>
