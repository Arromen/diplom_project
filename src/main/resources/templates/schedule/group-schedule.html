<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Расписание: <span th:text="${group.name}"></span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Расписание группы: <span th:text="${group.name}"></span></h1>
<a href="/schedule/group/{id}/week"
   th:href="@{/schedule/group/{id}/week(id=${group.id})}"
   class="btn btn-primary mb-3">Расписание на неделю</a>
<a href="/schedule" class="btn btn-secondary mb-3">← Назад к списку групп</a>

<div th:if="${#lists.isEmpty(lessons)}" class="alert alert-info">
    У группы пока нет занятий.
</div>

<table th:unless="${#lists.isEmpty(lessons)}" class="table table-bordered">
    <thead>
    <tr>
        <th>Дата и время</th>
        <th>Аудитория</th>
        <th>Предмет / Цель</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="l : ${lessons}">
        <td>
            <span th:text="${#temporals.format(l.startTime, 'dd.MM.yyyy HH:mm')}"></span> –
            <span th:text="${#temporals.format(l.endTime, 'HH:mm')}"></span>
        </td>
        <td th:text="${l.classroom.name}"></td>
        <td>
            <div><strong th:text="${l.subject?.name ?: '—'}"></strong></div>
            <small th:text="${l.teacher?.fullName ?: '—'}"></small>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
