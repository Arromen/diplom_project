<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание группы — ИС «Университет»</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; color: #333; }
        .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; width: 260px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .sidebar .nav-link { font-weight: 500; color: #94a3b8; padding: 12px 20px; margin: 4px 15px; border-radius: 8px; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .sidebar .nav-link.active { color: #fff; background-color: #3b82f6; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .main-content { margin-left: 260px; padding: 40px; }
        .card-custom { background: #fff; border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="px-4 py-4 d-flex align-items-center gap-2">
        <i class="bi bi-calendar2-week text-primary fs-3"></i>
        <span class="text-white fw-bold fs-5">ИС «Университет»</span>
    </div>
    <hr class="text-secondary mx-3">
    <ul class="nav flex-column mt-3">
        <li class="nav-item"><a class="nav-link active" href="/schedule"><i class="bi bi-people"></i> Группы</a></li>
        <li class="nav-item"><a class="nav-link" href="/schedule/teachers"><i class="bi bi-person-badge"></i> Преподаватели</a></li>
        <li class="nav-item"><a class="nav-link" href="/search"><i class="bi bi-search"></i> Поиск свободных комнат</a></li>
        <li class="nav-item" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')"><a class="nav-link" href="/bookings"><i class="bi bi-journal-bookmark"></i> Все бронирования</a></li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5 bg-white p-3 rounded-3 shadow-sm">
        <div>
            <span class="text-muted small">Академический архив занятий</span>
            <h4 class="fw-bold mb-0 text-dark">Группа: <span class="text-primary" th:text="${group.name}"></span></h4>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/schedule/group/{id}/week(id=${group.id})}" class="btn btn-primary d-flex align-items-center gap-2" style="border-radius: 8px;">
                <i class="bi bi-calendar3"></i> Открыть интерактивный календарь
            </a>
            <a href="/schedule" class="btn btn-light border" style="border-radius: 8px;">Назад</a>
        </div>
    </div>

    <!-- Реестр занятий -->
    <div class="card card-custom p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr class="text-secondary small text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.5px;">
                    <th class="ps-3">Дата / Время проведения</th>
                    <th>Дисциплина</th>
                    <th>Преподаватель</th>
                    <th>Место проведения</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td class="ps-3">
                        <div class="fw-bold text-dark" th:text="${#temporals.format(b.startTime, 'dd.MM.yyyy')}"></div>
                        <small class="text-muted"><i class="bi bi-clock me-1"></i> <span th:text="${#temporals.format(b.startTime, 'HH:mm')} + ' - ' + ${#temporals.format(b.endTime, 'HH:mm')}"></span></small>
                    </td>
                    <td>
                        <span class="fw-semibold text-primary" th:text="${b.subject != null ? b.subject.name : b.purpose}"></span>
                    </td>
                    <td>
                        <span class="text-secondary" th:text="${b.teacher != null ? b.teacher.fullName : 'Не указан'}"></span>
                    </td>
                    <td>
                        <span class="badge bg-secondary-subtle text-secondary-heading px-2.5 py-1.5 rounded" style="font-size: 0.85rem;">
                            <i class="bi bi-door-open me-1"></i> Кабинет <span th:text="${b.classroom.name}"></span>
                        </span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="4" class="text-center text-muted py-5">
                        <i class="bi bi-calendar-minus fs-2 d-block mb-2 text-neutral-400"></i> Для данной группы занятий пока не запланировано
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
