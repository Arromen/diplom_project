<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Преподаватели</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Преподаватели</h1>

<table class="table table-striped">
    <thead><tr><th>ФИО</th><th>Действие</th></tr></thead>
    <tbody>
    <tr th:each="t : ${teachers}">
        <td th:text="${t.fullName}"></td>
        <td>
            <a th:href="@{/schedule/teacher/{id}(id=${t.id})}"
               class="btn btn-sm btn-info">Расписание</a>
        </td>
    </tr>
    </tbody>
</table>

<a href="/schedule" class="btn btn-secondary">← Назад</a>
</body>
</html>
