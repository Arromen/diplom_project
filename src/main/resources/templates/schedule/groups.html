<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Группы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Учебные группы</h1>
<div class="mb-3">
    <a href="/schedule/teachers" class="btn btn-outline-primary">Расписание преподавателей</a>
</div>

<form method="post" action="/groups" class="mb-4">
    <div class="input-group">
        <input type="text" name="name" class="form-control" placeholder="Название новой группы (например: IT-СИП-22-23-Java)" required>
        <button type="submit" class="btn btn-success">Добавить группу</button>
    </div>
</form>

<table class="table table-striped">
    <thead><tr><th>Название группы</th><th>Действие</th></tr></thead>
    <tbody>
    <tr th:each="g : ${groups}">
        <td th:text="${g.name}"></td>
        <td><a th:href="@{/schedule/group/{id}(id=${g.id})}" class="btn btn-sm btn-info">Расписание</a></td>
    </tr>
    </tbody>
</table>
</body>
</html>
