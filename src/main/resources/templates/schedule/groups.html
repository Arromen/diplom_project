<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Группы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4 bg-light p-3 rounded">
    <h1>Учебные группы</h1>
    <div>
        <div sec:authorize="isAuthenticated()">
            Вы вошли как: <strong sec:authentication="name"></strong>
            <a href="/logout" class="btn btn-sm btn-outline-danger ms-2">Выйти</a>
        </div>
        <div sec:authorize="isAnonymous()">
            <a href="/login" class="btn btn-sm btn-primary">Войти в систему</a>
        </div>
    </div>
</div>

<div class="mb-3">
    <a href="/schedule/teachers" class="btn btn-outline-primary">Расписание преподавателей</a>
</div>

<form method="post" action="/groups" class="mb-4" sec:authorize="hasRole('ADMIN')">
    <div class="input-group">
        <input type="text" name="name" class="form-control" placeholder="Название новой группы" required>
        <button type="submit" class="btn btn-success">Добавить группу</button>
    </div>
</form>

<table class="table table-striped">
    <thead><tr><th>Название группы</th><th>Действие</th></tr></thead>
    <tbody>
    <tr th:each="g : ${groups}">
        <td th:text="${g.name}"></td>
        <td>
            <a th:href="@{/schedule/group/{id}(id=${g.id})}" class="btn btn-sm btn-info">Список</a>
            <a th:href="@{/schedule/group/{id}/week(id=${g.id})}" class="btn btn-sm btn-primary ms-1">Календарь</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
