<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — ИС «Университет»</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .input-custom {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.95rem;
        }
        .input-custom:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .btn-login {
            background-color: #3b82f6;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <div class="bg-primary-subtle text-primary rounded-3 d-inline-flex align-items-center justify-content-center mb-3" style="width: 50px; height: 50px;">
            <i class="bi bi-shield-lock-fill fs-3"></i>
        </div>
        <h4 class="fw-bold text-dark mb-1">Добро пожаловать</h4>
        <p class="text-muted small">Введите учетные данные для доступа к панели</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 py-2.5 rounded-3 small" style="font-size: 0.85rem;">
        <i class="bi bi-exclamation-circle-fill"></i> Неверный логин или пароль
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Имя пользователя</label>
            <input type="text" name="username" class="form-control input-custom" placeholder="admin / teacher / guest" required autocomplete="off">
        </div>

        <div class="mb-4">
            <label class="form-label small fw-semibold text-secondary">Пароль</label>
            <input type="password" name="password" class="form-control input-custom" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100 text-white">
            <i class="bi bi-box-arrow-in-right me-1"></i> Авторизоваться
        </button>
    </form>
</div>

</body>
</html>
